name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    # Use larger machine with more disk space
    runs-on: ubuntu-24.04-32core
    container:
      # Use a container image if specified in the matrix, otherwise run on the runner host.
      image: ${{ matrix.container }}
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "standard"
            python-version: "3.10"
            profile: "dev-nemo"
            test-target: "."
            test-filter: "-m 'not nemo_rl'"
            coverage-filter: "--omit='src/ml_flashpoint/adapter/nemo_rl/*'"
            artifact-name: "coverage-reports"
            run-cpp-coverage: true
          - name: "nemo-rl"
            # NeMo RL image already has Python 3.12 and its dependencies pre-installed.
            container: "nvcr.io/nvidia/nemo-rl:v0.5.0"
            profile: "dev-nemo-rl"
            test-target: "tests/adapter/nemo_rl"
            coverage-filter: "--include='src/ml_flashpoint/adapter/nemo_rl/*'"
            artifact-name: "coverage-reports-nemo-rl"
            run-cpp-coverage: false
            # Use a login shell to ensure container environment profiles are correctly loaded.
            shell: "bash -l {0}"
            # Megatron-LM repository needs to be in PYTHONPATH for nemo_rl to work correctly.
            pythonpath: "/opt/nemo-rl/3rdparty/Megatron-LM-workspace/Megatron-LM/"
    env:
      PYTHON_FAIL_UNDER: 90
      CPP_FAIL_UNDER: 80
      PYTHONPATH: ${{ matrix.pythonpath }}${{ matrix.pythonpath && ':' }}$PYTHONPATH
    permissions:
      contents: read # Required for actions/checkout
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash {0}' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        # Only needed for standard builds; NeMo RL image already has a pre-configured Python environment.
        if: ${{ !matrix.container }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # ratchet:actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - run: df -h
      
      - name: Debug Environment
        run: |
          echo "Current Path: $PATH"
          echo "Python Path: $PYTHONPATH"
          which python
          python --version
          env | sort
          # Search for megatron to see where it is
          find /opt -name "megatron" -type d -maxdepth 4 2>/dev/null | head -n 20 || true
          # Check for .pth files in site-packages
          find /opt -name "*.pth" 2>/dev/null || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          df -h
          # Install python dependencies (with coverage enabled)
          echo -e "\n##### Running pip install #####"
          pip install -e '.[${{ matrix.profile }}]' --config-settings=cmake.args="-DENABLE_COVERAGE=ON"

      - run: df -h

      - name: Test with pytest with coverage enabled
        run: |
          # Run tests based on python version target and filter
          echo -e "\n##### Running Python tests with coverage #####"
          python -m coverage run --source=src/ml_flashpoint --branch -m pytest -v -s ${{ matrix.test-filter }} ${{ matrix.test-target }}

      - name: Check Python test coverage
        run: |
          # Verify python coverage thresholds with specific filter
          echo -e "\n##### Generating Python coverage XML #####"
          python -m coverage xml -o python-coverage.xml ${{ matrix.coverage-filter }}
          echo -e "\n##### Verifying Python coverage thresholds #####"
          python -m coverage report --fail-under=${{ env.PYTHON_FAIL_UNDER }} ${{ matrix.coverage-filter }}

      - name: Python Coverage Summary
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # ratchet:irongut/CodeCoverageSummary@v1.3.0
        if: always() # Run even if threshold check above fails
        with:
          filename: python-coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '${{ env.PYTHON_FAIL_UNDER }} 95'

      - name: Add Python Coverage Title
        if: always()
        run: |
          # Only run if the summary was actually generated
          if [ -f code-coverage-results.md ]; then
            echo '### Python Code Coverage Summary' | cat - code-coverage-results.md > temp && mv temp python-code-coverage-results.md
          fi

      - name: Add Python Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        if: false # TODO remove once new workflow confirmed to work
        with:
          recreate: true
          path: python-code-coverage-results.md

      - name: Check C++ test coverage
        if: matrix.run-cpp-coverage
        run: |
          # Run C++ coverage check
          echo -e "\n##### Running C++ coverage check #####"
          mkdir -p htmlcov/cpp
          gcovr --root=. \
            --filter=src/ml_flashpoint \
            --exclude=".*/_deps/.*" \
            --exclude="/tmp/.*" \
            --exclude=".*pybind11.*" \
            --gcov-ignore-errors=source_not_found \
            --gcov-executable=gcov \
            --txt-metric branch \
            --html-details htmlcov/cpp/index.html \
            --xml-pretty -o cxx-coverage.xml \
            --sort uncovered-number \
            --gcov-ignore-parse-errors negative_hits.warn \
            --gcov-ignore-parse-errors suspicious_hits.warn \
            --gcov-ignore-errors=no_working_dir_found \
            --fail-under-line=${{ env.CPP_FAIL_UNDER }}

      - name: C++ Coverage Summary
        if: matrix.run-cpp-coverage
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # ratchet:irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: cxx-coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '${{ env.CPP_FAIL_UNDER }} 40'

      - name: Add C++ Coverage Title
        if: always() && matrix.run-cpp-coverage
        run: |
          if [ -f code-coverage-results.md ]; then
            echo '### C++ Code Coverage Summary' | cat - code-coverage-results.md > temp && mv temp cpp-code-coverage-results.md
          fi

      - name: Add C++ Coverage PR Comment
        if: false && matrix.run-cpp-coverage # TODO: remove when new workflow confirmed to work
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: cpp-coverage
          recreate: true
          path: cpp-code-coverage-results.md

      - name: Save PR number
        # Use always() so this runs even if previous coverage/test steps failed.
        if: always() && github.event_name == 'pull_request'
        run: |
          echo ${{ github.event.number }} > pr_number.txt

      - name: Archive coverage reports
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        if: always()
        with:
          name: ${{ matrix.artifact-name }}
          if-no-files-found: warn # Default, but setting explicitly for awareness as non-PRs won't have pr_number.txt
          path: |
            htmlcov/
            python-coverage.xml
            cxx-coverage.xml
            python-code-coverage-results.md
            cpp-code-coverage-results.md
            pr_number.txt

  lint-code:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # ratchet:actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Lint with ruff
        run: |
          pip install ruff==0.12.11
          ruff check .
          ruff format --check .

      - name: Lint with clang-format
        run: |
          # Install and run C++ linter
          echo -e "\n##### Installing and running clang-format linter #####"
          sudo apt-get update && sudo apt-get install -y clang-format-18
          clang-format-18 --version
          find src -name '*.cpp' -o -name '*.h' | xargs clang-format-18 --dry-run --Werror

  lint-license:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: 'Set up Go'
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # ratchet:actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      - name: 'Validate License Headers'
        shell: 'bash'
        run: |
          go run github.com/google/addlicense@v1.1.1 -check -s=only .

  # Add a gatekeeper job to act as the (main) required check, which in turn depends on all other required jobs.
  # This makes the required check management in GitHub settings tractable, as we don't have to tweak the settings everytime
  # a job name changes or a matrix option is modified.
  ci-success:
    runs-on: ubuntu-latest
    if: always()
    # Specify all top-level jobs that are required to pass.
    needs: [build, lint-code, lint-license]
    steps:
      - name: Check overall status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more dependent jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed!"
